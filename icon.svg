<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient matching your progress ring -->
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a23d" />
      <stop offset="100%" stop-color="#35d07f" />
    </linearGradient>
  </defs>
  
  <!-- Theme Background (Dark Surface) -->
  <rect width="512" height="512" rx="112" fill="#14161c" />
  
  <!-- Inner Border matching your console border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#333949" stroke-width="8" />

  <!-- Main "GATE" Text -->
  <text x="256" y="270" font-family="'Space Grotesk', system-ui, sans-serif" font-size="150" font-weight="bold" fill="url(#gateGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">GATE</text>
  
  <!-- Sub "DA" Text -->
  <text x="256" y="370" font-family="'JetBrains Mono', monospace" font-size="50" font-weight="600" fill="#8a8fa0" text-anchor="middle" letter-spacing="12">DA</text>
</svg>
